<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quotex Charts</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root {
  --bg:          #080b12;
  --panel:       #0d1117;
  --panel2:      #111827;
  --card:        #141c2b;
  --hover:       #1a2236;
  --hover2:      #1f2a3d;
  --border:      #1e2d45;
  --border2:     #253552;
  --accent:      #c84040;
  --accent-glow: rgba(200,64,64,.3);
  --bull:        #26c6a0;
  --bear:        #ef5350;
  --green:       #26c6a0;
  --red:         #ef5350;
  --gold:        #f0b429;
  --blue:        #4d9fff;
  --text:        #d0dae8;
  --text2:       #8a99b3;
  --text3:       #4a5a72;
  --white:       #f0f4ff;
  --chart-bg:    #090c14;
  --grid:        rgba(28,42,65,.8);
  --sidebar-w:   210px;
  --r-sm: 4px; --r-md: 7px; --r-lg: 10px;
  --dur-fast: .12s; --dur-mid: .22s; --dur-slow: .35s;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: 13px; overflow: hidden; user-select: none; }
body { display: flex; flex-direction: column; }

/* ── TOPBAR ── */
#topbar {
  display: flex; align-items: center; gap: 5px;
  height: 44px; padding: 0 8px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; z-index: 100;
}
.logo-block { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.logo-icon  {
  width: 26px; height: 26px; border-radius: 5px;
  background: linear-gradient(135deg, var(--accent) 0%, #8b1c1c 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 900; color: #fff;
  box-shadow: 0 0 10px var(--accent-glow); flex-shrink: 0;
}
.logo-text  { display: flex; flex-direction: column; line-height: 1; }
.logo-main  { font-size: 12px; font-weight: 800; color: var(--white); letter-spacing: 1.5px; }
.logo-sub   { font-size: 7px; color: var(--text3); letter-spacing: 2px; }
.vsep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; margin: 0 1px; }

#assetBtn {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: var(--r-md);
  border: 1px solid var(--border); background: var(--card);
  color: var(--text); font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all var(--dur-fast);
  white-space: nowrap; flex-shrink: 0; min-width: 120px;
}
#assetBtn:hover { border-color: var(--border2); background: var(--hover); }
#assetBtn .ab-arrow { font-size: 9px; color: var(--text3); }

/* TF dropdown button */
.tf-wrap { position: relative; flex-shrink: 0; }
#btnTF {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: var(--r-md);
  border: 1px solid var(--border); background: var(--card);
  color: var(--text); font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all var(--dur-fast); white-space: nowrap;
}
#btnTF:hover { border-color: var(--accent); background: var(--hover); }
#btnTF .tf-arrow { font-size: 9px; color: var(--text3); }
#tfDropdown {
  position: absolute; top: calc(100% + 6px); left: 0;
  background: var(--panel2); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 6px;
  display: none; flex-direction: column; gap: 3px;
  box-shadow: 0 8px 30px rgba(0,0,0,.6); z-index: 300;
  min-width: 160px;
}
#tfDropdown.open { display: flex; }
.tf-section-title {
  font-size: 9px; font-weight: 700; color: var(--text3);
  letter-spacing: 1.5px; text-transform: uppercase;
  padding: 3px 6px;
}
.tf-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 3px; margin-bottom: 4px; }
.tf-opt {
  padding: 4px 6px; border-radius: var(--r-sm);
  border: 1px solid transparent; background: transparent;
  color: var(--text3); font-size: 11px; font-weight: 600;
  cursor: pointer; transition: all var(--dur-fast); text-align: center;
}
.tf-opt:hover  { background: var(--hover); color: var(--text); border-color: var(--border); }
.tf-opt.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Zoom */
.zoom-group { display: flex; gap: 2px; flex-shrink: 0; }
.ctrl-btn {
  padding: 4px 9px; border-radius: var(--r-sm);
  border: 1px solid var(--border); background: var(--card);
  color: var(--text2); font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all var(--dur-fast);
}
.ctrl-btn:hover { border-color: var(--blue); color: var(--blue); background: rgba(77,159,255,.08); }

/* Connect */
#btnConnect {
  padding: 5px 12px; border-radius: var(--r-md);
  border: 1px solid var(--accent); background: var(--accent);
  color: #fff; font-size: 11.5px; font-weight: 700;
  cursor: pointer; transition: all var(--dur-mid); white-space: nowrap; flex-shrink: 0;
  box-shadow: 0 0 8px var(--accent-glow);
}
#btnConnect.connected {
  background: rgba(38,198,160,.1); border-color: var(--green);
  color: var(--green); box-shadow: none;
}
#btnConnect:hover { opacity: .85; }

/* Settings */
#btnSettings {
  padding: 4px 8px; border-radius: var(--r-md);
  border: 1px solid var(--border); background: var(--card);
  color: var(--text3); font-size: 14px; cursor: pointer;
  transition: all var(--dur-fast); flex-shrink: 0;
}
#btnSettings:hover { border-color: var(--border2); color: var(--text); }

/* Status dot */
#statusDot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--text3); flex-shrink: 0; transition: all .3s;
}
#statusDot.connected  { background: var(--green); box-shadow: 0 0 6px var(--green); }
#statusDot.connecting { background: var(--gold); animation: pulse 1s infinite; }

/* Price ticker */
#priceTicker { margin-inline-start: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
#priceWrap   { display: flex; align-items: baseline; gap: 3px; }
#priceValue  {
  font-size: 18px; font-weight: 800; color: var(--green);
  font-variant-numeric: tabular-nums; transition: color .1s; letter-spacing: .3px;
}
#priceValue.dn { color: var(--red); }
#priceArrow { font-size: 12px; color: var(--green); transition: color .1s; }
#priceArrow.dn { color: var(--red); }
#clockWrap { font-size: 11px; color: var(--text3); text-align: end; }
#clockTime { font-size: 12px; color: var(--text2); font-weight: 600; font-variant-numeric: tabular-nums; }

/* ── MAIN LAYOUT ── */
#mainWrap { display: flex; flex: 1; overflow: hidden; min-height: 0; }

/* ── SIDEBAR ── */
#sidebar {
  width: var(--sidebar-w); background: var(--panel);
  border-inline-start: 1px solid var(--border);
  display: flex; flex-direction: column;
  flex-shrink: 0; overflow: hidden;
  transition: width var(--dur-slow);
}
#sidebar.collapsed { width: 0; }
.sb-header { padding: 8px 8px 6px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sb-title { font-size: 10px; font-weight: 700; color: var(--text3);
  letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
#sbSearch {
  width: 100%; padding: 5px 9px; border-radius: var(--r-md);
  border: 1px solid var(--border); background: var(--card);
  color: var(--text); font-size: 12px; outline: none; transition: border-color var(--dur-fast);
}
#sbSearch::placeholder { color: var(--text3); }
#sbSearch:focus { border-color: var(--blue); }
.sb-cats { display: flex; gap: 3px; margin-top: 5px; flex-wrap: wrap; }
.sb-cat {
  padding: 2px 6px; border-radius: 20px; border: 1px solid var(--border);
  background: transparent; color: var(--text3); font-size: 10px; font-weight: 600;
  cursor: pointer; transition: all var(--dur-fast);
}
.sb-cat:hover  { background: var(--hover); color: var(--text); }
.sb-cat.active { background: var(--accent); border-color: var(--accent); color: #fff; }
#sbList {
  flex: 1; overflow-y: auto; padding: 3px 0;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
#sbList::-webkit-scrollbar { width: 3px; }
#sbList::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.sb-section { font-size: 9px; font-weight: 700; color: var(--text3);
  letter-spacing: 1.5px; text-transform: uppercase;
  padding: 5px 8px 3px; opacity: .6; }
.sb-item {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px; cursor: pointer; transition: background var(--dur-fast);
  position: relative;
}
.sb-item:hover  { background: var(--hover); }
.sb-item.active { background: var(--hover2); }
.sb-item.active::after {
  content: ''; position: absolute; inset-inline-end: 0; top: 15%; bottom: 15%;
  width: 2px; background: var(--accent); border-radius: 2px;
}
.sb-icon {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--card); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-weight: 800; color: var(--text2); flex-shrink: 0;
}
.sb-info { flex: 1; min-width: 0; }
.sb-name { font-size: 11px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-type { font-size: 9px; color: var(--text3); }
.sb-pct  { font-size: 10px; font-weight: 700; color: var(--green); flex-shrink: 0; font-variant-numeric: tabular-nums; }
.sb-dot  { width: 5px; height: 5px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
.sb-dot.live { background: var(--green); box-shadow: 0 0 4px var(--green); animation: pulse 2s infinite; }
.sb-star {
  background: none; border: none; cursor: pointer;
  font-size: 12px; color: var(--text3); padding: 1px 2px;
  border-radius: 3px; line-height: 1; flex-shrink: 0;
  opacity: 0; transition: color var(--dur-fast);
}
.sb-item:hover .sb-star { opacity: 1; }
.sb-star.starred { color: var(--gold); opacity: 1; }

/* ── CHART AREA ── */
#chartArea { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* ── FAVBAR — pinned pairs overlaid on chart top (Quotex style) ── */
#favBar {
  position: absolute; top: 4px; left: 6px; right: 6px;
  height: 32px;
  display: flex; align-items: center; gap: 5px;
  overflow-x: auto; overflow-y: hidden;
  z-index: 15; pointer-events: auto;
  background: transparent;
  scrollbar-width: none;
}
#favBar::-webkit-scrollbar { display: none; }
#favBar:empty { display: none; }
.fav-tab {
  position: relative;
  display: flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; flex-shrink: 0;
  border-radius: 50%;
  background: rgba(20,28,43,.92);
  border: 2px solid rgba(255,255,255,.08);
  color: var(--text); font-size: 9px; font-weight: 800;
  letter-spacing: .3px;
  cursor: pointer; white-space: nowrap;
  transition: border-color var(--dur-fast), background var(--dur-fast);
}
.fav-tab:hover  { border-color: var(--border2); background: rgba(26,34,54,.95); }
.fav-tab.active { border-color: var(--accent); }
.fav-tab .ft-x {
  position: absolute; top: -5px; left: -5px;
  width: 14px; height: 14px; border-radius: 50%;
  background: #1a2236; color: var(--text3);
  font-size: 8px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity var(--dur-fast);
}
.fav-tab:hover .ft-x { opacity: 1; }
.fav-tab .ft-x:hover { color: var(--red); background: #242f45; }

/* Chart wrap */
#chartWrap { flex: 1; position: relative; overflow: hidden; min-height: 0; }
#chart     { width: 100%; height: 100%; }

/* Overlay */
#overlay {
  position: absolute; inset: 0;
  background: rgba(8,11,18,.92); backdrop-filter: blur(4px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; z-index: 30; transition: opacity var(--dur-slow);
}
#overlay.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 32px; height: 32px; border: 2px solid var(--border2);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .75s linear infinite;
}
#overlayMsg { font-size: 13px; color: var(--text2); text-align: center; line-height: 1.7; }
#overlayMsg b { color: var(--text); }

/* Price flash */
.price-flash {
  position: absolute; inset: 0; pointer-events: none;
  z-index: 25; opacity: 0; transition: opacity .05s;
}
.price-flash.up   { background: radial-gradient(ellipse at 50% 50%, rgba(38,198,160,.04) 0%, transparent 70%); }
.price-flash.down { background: radial-gradient(ellipse at 50% 50%, rgba(239,83,80,.04) 0%, transparent 70%); }
.price-flash.show { opacity: 1; }

/* ── PRICE LINE LABEL + COUNTDOWN (matching Quotex) ── */
#priceLabel {
  position: absolute; right: 0; top: 50%;
  transform: translateY(-50%);
  display: flex; align-items: center; gap: 0;
  pointer-events: none; z-index: 20;
  opacity: 0; transition: opacity .2s;
}
#priceLabel.visible { opacity: 1; }
#priceLabelVal {
  font-size: 11px; font-weight: 800; color: #111;
  padding: 3px 7px; border-radius: 3px;
  font-variant-numeric: tabular-nums; white-space: nowrap;
  background: #ffffff; min-width: 72px; text-align: center;
}

/* ── CANDLE COUNTDOWN TAG — rides the white price line, next to the live candle (Quotex-style) ── */
#countdownTag {
  position: absolute; top: 0; left: 0;
  transform: translate(-50%, -50%);
  margin-top: 13px; /* sits just under the dashed price line */
  z-index: 20; pointer-events: none;
  opacity: 0; transition: opacity .2s;
}
#countdownTag.visible { opacity: 1; }
#countdownLabel {
  display: block;
  font-size: 10px; font-weight: 700; color: #111;
  padding: 3px 8px; border-radius: 3px;
  background: rgba(255,255,255,.92); white-space: nowrap;
  font-variant-numeric: tabular-nums; text-align: center;
  box-shadow: 0 1px 5px rgba(0,0,0,.4);
}
#countdownLabel.warn { background: rgba(240,180,41,.95); color: #000; }

/* ── STATUS BAR ── */
#statusBar {
  height: 24px; background: var(--panel); border-top: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 8px; gap: 10px;
  font-size: 10px; color: var(--text3); flex-shrink: 0;
}
#connStatus  { color: var(--text3); }
#assetLabel  { color: var(--text2); font-weight: 600; }
#candleInfo  { margin-inline-start: auto; font-variant-numeric: tabular-nums; color: var(--text2); }
.badge {
  font-size: 9px; border-radius: 3px; padding: 1px 5px;
  opacity: 0; transition: opacity .3s; font-weight: 600;
}
.badge.visible { opacity: 1; }
#histBadge { color: var(--gold); border: 1px solid rgba(240,180,41,.4); background: rgba(240,180,41,.05); }
#btnSidebar {
  padding: 0 6px; background: none; border: none;
  color: var(--text3); font-size: 15px; cursor: pointer; transition: color var(--dur-fast);
}
#btnSidebar:hover { color: var(--text); }

/* ── ASSET DROPDOWN ── */
#assetPanel {
  position: fixed; top: 48px; right: 0; left: 0;
  margin: 0 auto; max-width: 340px;
  background: var(--panel2); border: 1px solid var(--border);
  border-radius: var(--r-lg); box-shadow: 0 12px 40px rgba(0,0,0,.6);
  z-index: 200; overflow: hidden;
  opacity: 0; pointer-events: none;
  transform: translateY(-8px);
  transition: opacity var(--dur-mid), transform var(--dur-mid);
}
#assetPanel.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
.ap-search-wrap { padding: 8px; border-bottom: 1px solid var(--border); }
#apSearch {
  width: 100%; padding: 6px 10px; border-radius: var(--r-md);
  border: 1px solid var(--border); background: var(--card);
  color: var(--text); font-size: 12px; outline: none;
}
#apSearch:focus { border-color: var(--blue); }
#apSearch::placeholder { color: var(--text3); }
.ap-cats { display: flex; gap: 4px; padding: 5px 8px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.ap-cat  {
  padding: 2px 8px; border-radius: 20px; border: 1px solid var(--border);
  background: transparent; color: var(--text3); font-size: 10px; font-weight: 600;
  cursor: pointer; transition: all var(--dur-fast);
}
.ap-cat:hover  { background: var(--hover); color: var(--text); }
.ap-cat.active { background: var(--accent); border-color: var(--accent); color: #fff; }
#apList {
  max-height: 280px; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
#apList::-webkit-scrollbar { width: 3px; }
#apList::-webkit-scrollbar-thumb { background: var(--border2); }
.ap-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; cursor: pointer; transition: background var(--dur-fast);
}
.ap-item:hover  { background: var(--hover); }
.ap-item.active { background: var(--hover2); }
.ap-item .ai-icon {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--card); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 800; color: var(--text2); flex-shrink: 0;
}
.ap-item .ai-name  { font-size: 12px; font-weight: 700; color: var(--text); }
.ap-item .ai-label { font-size: 9.5px; color: var(--text3); }
.ap-item .ai-pct   { font-size: 10.5px; font-weight: 700; color: var(--green); margin-inline-start: auto; }

/* ── TOAST ── */
#toastStack {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; gap: 6px;
  z-index: 500; pointer-events: none; align-items: center;
}
.toast {
  display: flex; align-items: center; gap: 9px;
  background: var(--panel2); border: 1px solid var(--border2);
  border-radius: var(--r-lg); padding: 8px 12px;
  box-shadow: 0 6px 24px rgba(0,0,0,.6);
  font-size: 12px; color: var(--text);
  min-width: 200px; max-width: 360px;
  animation: toastIn .2s ease; pointer-events: auto;
  transition: opacity .2s, transform .2s;
}
.toast.out { opacity: 0; transform: translateY(6px); }
.toast.success { border-color: rgba(38,198,160,.5); }
.toast.error   { border-color: rgba(239,83,80,.5); }
.toast.warning { border-color: rgba(240,180,41,.5); }
.toast-close { color: var(--text3); cursor: pointer; margin-inline-start: auto; }
.toast-close:hover { color: var(--text); }

/* Reconnect */
#reconNotice {
  position: fixed; top: 52px; right: 10px;
  background: rgba(26,20,0,.95); border: 1px solid rgba(240,180,41,.4);
  border-radius: var(--r-md); padding: 4px 10px;
  font-size: 11px; color: var(--gold);
  opacity: 0; pointer-events: none; transition: opacity .25s; z-index: 50;
}
#reconNotice.visible { opacity: 1; }

/* ── SETTINGS PANEL ── */
#settingsPanel {
  position: fixed; inset-inline-end: 0; top: 0; bottom: 0;
  width: 280px; background: var(--panel2);
  border-inline-start: 1px solid var(--border);
  box-shadow: -8px 0 32px rgba(0,0,0,.5);
  z-index: 300; display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform var(--dur-slow);
  overflow: hidden;
}
html[dir="rtl"] #settingsPanel { transform: translateX(-100%); }
#settingsPanel.open { transform: translateX(0) !important; }
.sp-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.sp-title { font-size: 13px; font-weight: 700; color: var(--text); }
#btnCloseSettings {
  background: none; border: none; color: var(--text3);
  font-size: 16px; cursor: pointer; padding: 2px 6px; border-radius: 4px;
}
#btnCloseSettings:hover { color: var(--text); background: var(--hover); }
.sp-body {
  flex: 1; overflow-y: auto; padding: 10px;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.sp-section { margin-bottom: 14px; }
.sp-section-title {
  font-size: 9px; font-weight: 700; color: var(--text3);
  letter-spacing: 1.5px; text-transform: uppercase;
  margin-bottom: 7px; padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.sp-presets { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 6px; }
.sp-preset {
  padding: 6px 8px; border-radius: var(--r-md);
  border: 1px solid var(--border); background: var(--card);
  color: var(--text2); font-size: 10.5px; font-weight: 600;
  cursor: pointer; transition: all var(--dur-fast); text-align: center;
}
.sp-preset:hover  { border-color: var(--border2); color: var(--text); background: var(--hover); }
.sp-preset.active { border-color: var(--accent); color: var(--accent); background: rgba(200,64,64,.1); }
.sp-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 5px 0; gap: 8px;
}
.sp-row label { font-size: 11px; color: var(--text2); flex: 1; }
.sp-row input[type="color"] {
  width: 30px; height: 22px; padding: 1px; border-radius: 4px;
  border: 1px solid var(--border); background: var(--card); cursor: pointer;
}
.sp-row input[type="range"] { width: 80px; accent-color: var(--accent); cursor: pointer; }
.sp-row input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; width: 14px; height: 14px; }
.sp-actions { display: flex; gap: 5px; padding-top: 8px; border-top: 1px solid var(--border); }
.sp-btn {
  flex: 1; padding: 6px 8px; border-radius: var(--r-md);
  border: 1px solid var(--border); background: var(--card);
  color: var(--text2); font-size: 11px; font-weight: 600;
  cursor: pointer; transition: all var(--dur-fast);
}
.sp-btn:hover { background: var(--hover); color: var(--text); }
.sp-btn.primary { border-color: var(--accent); background: var(--accent); color: #fff; }
.sp-btn.primary:hover { opacity: .85; }

/* ── KEYFRAMES ── */
@keyframes spin    { to { transform: rotate(360deg); } }
@keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:.3} }
@keyframes toastIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
@keyframes flashUp { 0%,100%{background:transparent} 25%{background:rgba(38,198,160,.12)} }
@keyframes flashDn { 0%,100%{background:transparent} 25%{background:rgba(239,83,80,.12)} }
#priceValue.flash-up { animation: flashUp .3s; }
#priceValue.flash-dn { animation: flashDn .3s; }

@media (max-width: 900px) { #sidebar { display: none; } #clockWrap { display: none; } }

/* ── CHART TF PANEL — bottom-left overlay (Quotex style), collapsible ── */
#chartTfPanel {
  position: absolute; bottom: 28px; left: 6px;
  display: flex; flex-direction: column-reverse; gap: 4px;
  z-index: 15; pointer-events: auto;
}
.ctf-toggle {
  min-width: 40px;
}
.ctf-body {
  display: none; flex-direction: column; gap: 2px;
  margin-bottom: 4px;
}
.ctf-body.open { display: flex; }
.ctf-row { display: flex; gap: 2px; }
.ctf-btn {
  padding: 3px 8px; border-radius: var(--r-sm);
  border: 1px solid transparent;
  background: rgba(13,17,23,.82);
  color: var(--text3); font-size: 11px; font-weight: 600;

.ctf-btn.active { background: rgba(77,159,255,.2); color: #4d9fff; border-color: rgba(77,159,255,.5); }

<script>
'use strict';

// ════════════════════════════════════════════════════════

  NZDCHF_otc:78,USDINR_otc:78,
  USDBRL_otc:77,BTCUSD_otc:77,CADCHF_otc:77,GBPNZD_otc:77,BRENTOIL_otc:77,USDCOP_otc:77,USDIDR_otc:77,
  BNBUSD_otc:74,
  DASHUSD_otc:73,
  XRPUSD_otc:68,

const CRYPTO_SET = new Set([
  'BTCUSD_otc','ETHUSD_otc','LTCUSD_otc','XRPUSD_otc','BCHUSD_otc',
  'BNBUSD_otc','SOLUSD_otc','DOTUSD_otc','AVAXUSD_otc','LINKUSD_otc',

  'DASHUSD_otc','TRUMPUSD_otc',
]);
const COMM_SET = new Set(['USOIL_otc','BRENTOIL_otc']);
const CRYPTO_NAMES = {
  ETCUSD:'Ethereum Classic',ETHUSD:'Ethereum',SOLUSD:'Solana',
  XRPUSD:'Ripple',ATOMUSD:'Cosmos',BCHUSD:'Bitcoin Cash',TONUSD:'Toncoin',
  DOTUSD:'Polkadot',LTCUSD:'Litecoin',AVAXUSD:'Avalanche',AXSUSD:'Axie Infinity',
  LINKUSD:'Chainlink',BTCUSD:'Bitcoin',DASHUSD:'Dash',BNBUSD:'Binance Coin',
  ZECUSD:'Zcash',TRUMPUSD:'Trump'
};
const COMM_NAMES = {USOIL:'US Crude',BRENTOIL:'UK Brent'};

function pairLabel(p) {
  const b = p.replace('_otc','');
  if (CRYPTO_NAMES[b]) return CRYPTO_NAMES[b];
  if (COMM_NAMES[b])   return COMM_NAMES[b];
  return b.replace(/([A-Z]{3})([A-Z]{3})/,'$1/$2');
}
function pairCategory(p) {
  if (CRYPTO_SET.has(p)) return 'crypto';
  if (COMM_SET.has(p))   return 'commodity';
  return 'forex';
}
function pairInitials(p) {
  const b = p.replace('_otc','');
  if (CRYPTO_NAMES[b]) return b.slice(0,3);
  if (COMM_NAMES[b])   return b.slice(0,2);
  return b.slice(0,2);
}

// ════════════════════════════════════════════════════════
//  DECIMAL HELPERS
// ════════════════════════════════════════════════════════
function calcDecimals(price) {
  if (!price || price <= 0) return 5;
  if (price >= 10000) return 0;
  if (price >= 100)   return 3;
  return 5;
}
function roundStep(price) {
  if (!price || price <= 0) return 0.0001;
  if (price >= 10000) return 500;
  if (price >= 100)   return 1;
  return 0.0001;
}

//  STATE
// ════════════════════════════════════════════════════════

let currentAsset  = DEFAULT_ASSET;
let currentTf     = 1;
let currentTfLabel = 'M1';
let isConnected   = false;

let priceDir      = 0;

let _rnLines  = [];
let _pinnedSet = new Set();
let _showRoundLines = true;
let _priceFlashEnabled = true;
let _sbCat = 'all', _apCat = 'all';
let _sbVisible = true;
let _apOpen = false;
let _tfOpen = false;
let _priceLinePx = null;
let _srvOffset   = 0; // serverTime - Date.now()/1000, keeps the countdown synced to the broker's clock
function nowSrv() { return Date.now() / 1000 + _srvOffset; }

function tfSec() { return Math.max(5, Math.round(currentTf * 60)); }
// Unified bucket calculation with a tiny epsilon tolerance so a tick landing
// exactly on a period boundary (floating point jitter) never gets bucketed
// into the wrong candle — this was the cause of the occasional thin/extra
// candle appearing right at the live edge of the chart.
function bucketTime(t, period) { return Math.floor((t + 1e-6) / period) * period; }

// ════════════════════════════════════════════════════════
//  SETTINGS / LOCALSTORAGE
// ════════════════════════════════════════════════════════
const SETTINGS_KEY = 'qx_settings_v2';
const PINNED_KEY   = 'qx_pinned';

const THEMES = {
  'dark-pro':      { '--bg':'#080b12','--panel':'#0d1117','--panel2':'#111827','--card':'#141c2b','--hover':'#1a2236','--border':'#1e2d45','--chart-bg':'#090c14','--bull':'#26c6a0','--bear':'#ef5350','--text':'#d0dae8','--text2':'#8a99b3','--text3':'#4a5a72' },
  'night':         { '--bg':'#0a0a12','--panel':'#0f0f1a','--panel2':'#141422','--card':'#18182a','--hover':'#1e1e30','--border':'#252538','--chart-bg':'#0b0b14','--bull':'#00e5b0','--bear':'#ff4d6a','--text':'#ccd6f0','--text2':'#7a8aaa','--text3':'#404060' },
  'glass':         { '--bg':'#0c1220','--panel':'#101828','--panel2':'#141f30','--card':'#1a2840','--hover':'#1f3050','--border':'#243a5a','--chart-bg':'#0a1018','--bull':'#00d4aa','--bear':'#ff5555','--text':'#d5e0f0','--text2':'#8090b0','--text3':'#3a5070' },
  'blue':          { '--bg':'#050c18','--panel':'#0a1525','--panel2':'#0f1c30','--card':'#122038','--hover':'#162a48','--border':'#1e3555','--chart-bg':'#060e1c','--bull':'#00e676','--bear':'#ff1744','--text':'#c5d8f5','--text2':'#6a8ab0','--text3':'#2a4a70' },
  'minimal':       { '--bg':'#0e0e0e','--panel':'#141414','--panel2':'#1a1a1a','--card':'#202020','--hover':'#262626','--border':'#2a2a2a','--chart-bg':'#111111','--bull':'#4caf50','--bear':'#f44336','--text':'#e0e0e0','--text2':'#909090','--text3':'#505050' },
  'high-contrast': { '--bg':'#000000','--panel':'#0a0a0a','--panel2':'#111111','--card':'#181818','--hover':'#202020','--border':'#333333','--chart-bg':'#000000','--bull':'#00ff88','--bear':'#ff3333','--text':'#ffffff','--text2':'#cccccc','--text3':'#888888' },
};

function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
    document.getElementById('sp-bull').value       = s.bull       || '#26c6a0';
    document.getElementById('sp-bear').value       = s.bear       || '#ef5350';
    document.getElementById('sp-bull-wick').value  = s.bullWick   || '#26c6a0';
    document.getElementById('sp-bear-wick').value  = s.bearWick   || '#ef5350';
    document.getElementById('sp-chart-bg').value   = s.chartBg    || '#090c14';
    document.getElementById('sp-grid').value       = s.grid       || '#1c2a41';
    document.getElementById('sp-grid-vis').checked = s.gridVis !== false;
    document.getElementById('sp-candle-w').value   = s.candleW    || 1;
    document.getElementById('sp-font-size').value  = s.fontSize   || 11;
    document.getElementById('sp-round-lines').checked = s.roundLines !== false;
    document.getElementById('sp-price-flash').checked = s.priceFlash !== false;
    if (s.preset) applyPreset(s.preset, false);
    _showRoundLines    = s.roundLines !== false;
    _priceFlashEnabled = s.priceFlash !== false;
  } catch(_) {}
}

function saveSettings() {
  const s = {
    bull:       document.getElementById('sp-bull').value,
    bear:       document.getElementById('sp-bear').value,
    bullWick:   document.getElementById('sp-bull-wick').value,
    bearWick:   document.getElementById('sp-bear-wick').value,
    chartBg:    document.getElementById('sp-chart-bg').value,
    grid:       document.getElementById('sp-grid').value,
    gridVis:    document.getElementById('sp-grid-vis').checked,
    candleW:    parseFloat(document.getElementById('sp-candle-w').value),
    fontSize:   parseInt(document.getElementById('sp-font-size').value),
    roundLines: document.getElementById('sp-round-lines').checked,
    priceFlash: document.getElementById('sp-price-flash').checked,
  };
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
  applySettingsToChart();
  _showRoundLines    = s.roundLines;
  _priceFlashEnabled = s.priceFlash;
  if (lastPrice) drawRoundLines(lastPrice);
  showToast('تم حفظ الإعدادات', 'success');
}

function applyPreset(name, save = true) {
  const t = THEMES[name];
  if (!t) return;
  Object.entries(t).forEach(([k,v]) => document.documentElement.style.setProperty(k, v));
  document.querySelectorAll('.sp-preset').forEach(b => b.classList.toggle('active', b.dataset.preset === name));
  if (chart) {
    chart.applyOptions({
      layout: { background: { type: LightweightCharts.ColorType.Solid, color: t['--chart-bg'] || '#090c14' }, textColor: t['--text3'] || '#4a5a72' },
    });
  }
  if (save) {
    const s = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
    s.preset = name;
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
  }
}

function loadPinned() {

function savePinned() {
  localStorage.setItem(PINNED_KEY, JSON.stringify([..._pinnedSet]));
}
function toggleFav(asset, e) {
  if (e) { e.stopPropagation(); }
  if (_pinnedSet.has(asset)) {
    _pinnedSet.delete(asset);
  } else {
    _pinnedSet.add(asset);

    tab.querySelector('.ft-x').addEventListener('click', e => { e.stopPropagation(); toggleFav(p); });

function startClock() {

    document.getElementById('clockTime').textContent =
      `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  }

  _clockTmr = setInterval(tick, 1000);
}

// ════════════════════════════════════════════════════════
//  COUNTDOWN — floating tag riding the white price line, next to the live candle
// ════════════════════════════════════════════════════════
function updateCountdown() {
  if (_cdTmr) clearTimeout(_cdTmr);
  const tag = document.getElementById('countdownTag');
  const el  = document.getElementById('countdownLabel');
  if (!firstTick || !isConnected) {
    tag.classList.remove('visible');
    _cdTmr = setTimeout(updateCountdown, 1000);
    return;
  }
  const now    = nowSrv();
  const period = tfSec();
  const next   = (Math.floor(now / period) + 1) * period;
  const rem    = Math.max(0, Math.ceil(next - now));
  const mm = String(Math.floor(rem / 60)).padStart(2, '0');
  const ss = String(rem % 60).padStart(2, '0');
  el.textContent = `${mm}:${ss}`;
  el.classList.toggle('warn', rem <= 3);
  updateCountdownPos();
  _cdTmr = setTimeout(updateCountdown, 1000);
}

function updateCountdownPos() {
  const tag = document.getElementById('countdownTag');
  if (!chart || !candleSeries || !firstTick || !isConnected || lastPrice == null) { tag.classList.remove('visible'); return; }
  try {
    const period = tfSec();
    const ts = bucketTime(nowSrv(), period);
    const x  = chart.timeScale().timeToCoordinate(ts);
    const y  = chart.priceScale('right').priceToCoordinate(lastPrice);
    if (x == null || y == null) { tag.classList.remove('visible'); return; }
    tag.style.left = x + 'px';
    tag.style.top  = y + 'px';
    tag.classList.add('visible');
  } catch(_) { tag.classList.remove('visible'); }
}

function showToast(msg, type = 'info', dur = 4000) {
  const icons = {success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'};
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span>${icons[type]||'ℹ️'}</span><span style="flex:1">${msg}</span><span class="toast-close">✕</span>`;
  toast.querySelector('.toast-close').onclick = () => removeToast(toast);
  document.getElementById('toastStack').appendChild(toast);
  if (dur > 0) setTimeout(() => removeToast(toast), dur);
}

  t.classList.add('out');
  setTimeout(() => t.remove(), 220);
}

// ════════════════════════════════════════════════════════
//  CANDLE MAP + RENDER
// ════════════════════════════════════════════════════════
function mergeCandles(arr) {
  if (!arr || !arr.length) return false;
  let changed = false;
  const period = tfSec();
  for (const c of arr) {
    if (!c.time || !c.open || !c.close) continue;
    const ts = bucketTime(c.time, period);
    if (ts <= 0) continue;
    if (!candleMap.has(ts)) {
      candleMap.set(ts, { time:ts, open:c.open, high:c.high, low:c.low, close:c.close });
      changed = true;
    } else {
      const ex = candleMap.get(ts);
      const nh = Math.max(ex.high, c.high);
      const nl = Math.min(ex.low,  c.low);
      if (nh !== ex.high || nl !== ex.low || c.close !== ex.close) {
        ex.high = nh; ex.low = nl; ex.close = c.close;
        changed = true;
      }
    }
  }
  return changed;
}

function sortedCandles() {
  return Array.from(candleMap.values()).sort((a,b) => a.time - b.time);
}

let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(_doRender);
}
function _doRender() {
  _rafPending = false;
  const s = sortedCandles();
  if (!s.length) return;
  try {
    candleSeries.setData(s);
    chart.timeScale().scrollToRealTime();
    showHistBadge(true, s.length);
  } catch(_) {}
}
function updateOneCandle(c) {
  try { candleSeries.update({ ...c }); updatePriceLabelPos(); } catch(_) {}
}

// ════════════════════════════════════════════════════════
//  PRICE LINE UPDATE
// ════════════════════════════════════════════════════════
function applyDecimals(price) {
  const d = calcDecimals(price);
  if (d === _decimals) return;
  _decimals = d;
  const mv = Math.pow(10, -d);
  try {
    candleSeries.applyOptions({ priceFormat: { type:'price', precision: d, minMove: mv } });
    chart.applyOptions({ localization: { priceFormatter: p => p.toFixed(d) } });
    const s = sortedCandles();
    if (s.length) candleSeries.setData(s);
  } catch(_) {}
  if (_showRoundLines) drawRoundLines(price);
}

function drawRoundLines(centerPrice) {
  if (!centerPrice || centerPrice <= 0) return;
  _rnLines.forEach(l => { try { candleSeries.removePriceLine(l); } catch(_) {} });
  _rnLines = [];
  if (!_showRoundLines) return;
  const step = roundStep(centerPrice);
  const base = Math.round(centerPrice / step) * step;
  for (let i = -8; i <= 8; i++) {
    const lvl = parseFloat((base + i * step).toFixed(10));
    try {
      _rnLines.push(candleSeries.createPriceLine({
        price: lvl, color: 'rgba(90,100,130,.25)',
        lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Solid,
        axisLabelVisible: false, title: '',
      }));
    } catch(_) {}
  }
}

// ════════════════════════════════════════════════════════
//  TICK HANDLER
// ════════════════════════════════════════════════════════
function handleTick(price, serverTime) {
  if (!serverTime || serverTime < 1_000_000_000) return;
  _srvOffset = serverTime - Date.now() / 1000;
  if (price > 0) applyDecimals(price);

  const prevPrice = lastPrice;
  priceDir = lastPrice != null ? (price > lastPrice ? 1 : price < lastPrice ? -1 : priceDir) : 0;
  lastPrice = price;

  // Topbar price
  const el    = document.getElementById('priceValue');
  const arrow = document.getElementById('priceArrow');
  el.textContent = price.toFixed(_decimals);
  const isUp = priceDir >= 0;
  el.className   = isUp ? '' : 'dn';
  arrow.textContent = isUp ? '▲' : '▼';
  arrow.className   = isUp ? '' : 'dn';

  // Price line — always white like Quotex
  priceLineObj.applyOptions({ price, color: '#ffffff',
    axisLabelVisible: true, axisLabelColor: '#ffffff', axisLabelTextColor: '#111111' });

  // Custom overlay label beside the line (countdown)
  document.getElementById('priceLabelVal').textContent = price.toFixed(_decimals);
  // countdown className managed by updateCountdown
  updatePriceLabelPos();

  // Flash
  if (_priceFlashEnabled && prevPrice !== null && price !== prevPrice) {
    const flashEl = document.getElementById('priceFlash');
    const cls = price > prevPrice ? 'up' : 'down';
    flashEl.className = `price-flash ${cls} show`;
    setTimeout(() => { flashEl.className = `price-flash ${cls}`; }, 280);
    el.classList.remove('flash-up','flash-dn');
    void el.offsetWidth;
    el.classList.add(price > prevPrice ? 'flash-up' : 'flash-dn');
  }

  // Candle update
  const period   = tfSec();
  const candleTs = bucketTime(serverTime, period);
  if (candleMap.has(candleTs)) {
    const c = candleMap.get(candleTs);
    let dirty = false;
    if (price > c.high)    { c.high  = price; dirty = true; }
    if (price < c.low)     { c.low   = price; dirty = true; }
    if (price !== c.close) { c.close = price; dirty = true; }
    if (dirty) updateOneCandle(c);
  } else {
    const c = { time:candleTs, open:price, high:price, low:price, close:price };
    candleMap.set(candleTs, c);
    try { candleSeries.update({...c}); } catch(_) { scheduleRender(); }
  }
}

// ════════════════════════════════════════════════════════
//  LOAD CANDLES
// ════════════════════════════════════════════════════════
async function loadCandles(id, force = false) {
  let loaded = false;
  const enc = encodeURIComponent(currentAsset);
  try {
    const r = await fetch(`/api/history?asset=${enc}&tf=${currentTf}&limit=50000`);
    if (id !== connId) return false;
    const d = await r.json();
    if (d.candles && d.candles.length) {
      if (mergeCandles(d.candles) || force) { scheduleRender(); loaded = true; }
    }
  } catch(_) {}
  try {
    const r = await fetch(`/api/candles?asset=${enc}&tf=${currentTf}`);
    if (id !== connId) return false;
    const d = await r.json();
    if (d.candles && d.candles.length) {
      if (mergeCandles(d.candles) || force) { scheduleRender(); loaded = true; }
    }
  } catch(_) {}
  return loaded || candleMap.size > 0;
}

// ════════════════════════════════════════════════════════
//  SSE — Real-time stream
// ════════════════════════════════════════════════════════
function startPricePoll() {
  stopPricePoll();
  const id  = connId;
  const enc = encodeURIComponent(currentAsset);
  let   noTickTimer = null;

  const es = new EventSource(`/api/stream?asset=${enc}`);
  _sseSource = es;

  es.onmessage = async (ev) => {
    if (id !== connId) { es.close(); return; }
    try {
      const d = JSON.parse(ev.data);
      if (d.ping) return;
      if (d.price == null) return;
      if (!firstTick) {
        firstTick = true;
        setDot('connected'); setStatus('متصل');
        if (noTickTimer) { clearTimeout(noTickTimer); noTickTimer = null; }
        await loadCandles(id, true);
        hideOverlay(); hideReconNotice();
        updateCountdown();
      }
      handleTick(d.price, d.time);
      updateCountdown();
    } catch(_) {}
  };

  es.onerror = () => {
    if (id !== connId) return;
    es.close();
    _sseSource = null;
    _priceTmr = setTimeout(() => _pollFallback(id, 0), 1000);
  };

  noTickTimer = setTimeout(() => {
    if (id !== connId || firstTick) return;
    showOverlay('<b>تحذير:</b> لا يصل سعر — تحقق credentials.json');
  }, 30000);
}

async function _pollFallback(id, wait) {
  if (!isConnected || id !== connId) return;
  try {
    const r = await fetch(`/api/price?asset=${encodeURIComponent(currentAsset)}`);
    if (id !== connId) return;
    const d = await r.json();
    if (d.price != null) {
      if (!firstTick) {
        firstTick = true;
        setDot('connected'); setStatus('متصل');
        await loadCandles(id, true);
        hideOverlay(); hideReconNotice();
        updateCountdown();
      }
      handleTick(d.price, d.time);
      updateCountdown();
      wait = 0;
    } else {
      wait++;
      if (wait % 10 === 0) { await loadCandles(id); if (candleMap.size > 0) hideOverlay(); }
    }
  } catch(_) {}
  if ((wait % 20) === 0 && wait > 0) { startPricePoll(); return; }
  _priceTmr = setTimeout(() => _pollFallback(id, wait), 250);
}

function stopPricePoll() {
  if (_sseSource) { try { _sseSource.close(); } catch(_) {} _sseSource = null; }
  if (_priceTmr)  { clearTimeout(_priceTmr); _priceTmr = null; }
}

// ════════════════════════════════════════════════════════
//  CHANGE ASSET — instant, no reload
// ════════════════════════════════════════════════════════
function changeAsset(asset) {
  if (asset === currentAsset) return;
  currentAsset = asset;
  candleMap.clear();
  firstTick = false;
  lastPrice = null;
  _rnLines.forEach(l => { try { candleSeries.removePriceLine(l); } catch(_) {} });
  _rnLines = [];
  document.getElementById('priceLabelVal').textContent = '0.00000';
  document.getElementById('priceValue').textContent    = '——';
  document.getElementById('assetBtnLabel').textContent = pairLabel(asset);
  setStatus('تحميل…');

  // Load from cache immediately (no overlay, no reconnect)
  const enc = encodeURIComponent(asset);
  const id  = ++connId;
  stopPricePoll();

  fetch(`/api/history?asset=${enc}&tf=${currentTf}&limit=50000`)
    .then(r => r.json())
    .then(d => {
      if (id !== connId) return;
      if (d.candles && d.candles.length) { mergeCandles(d.candles); scheduleRender(); }
    }).catch(()=>{});

  fetch(`/api/candles?asset=${enc}&tf=${currentTf}`)
    .then(r => r.json())
    .then(d => {
      if (id !== connId) return;
      if (d.candles && d.candles.length) { mergeCandles(d.candles); scheduleRender(); }
    }).catch(()=>{});

  if (isConnected) {
    firstTick = false;
    startPricePoll();
  }
  setStatus('جاهز');
}

// ════════════════════════════════════════════════════════
//  CHANGE TF
// ════════════════════════════════════════════════════════
function changeTf(tf, label) {
  currentTf    = tf;
  currentTfLabel = label;
  document.getElementById('btnTFLabel').textContent = label;
  document.getElementById('tfPanelToggle').textContent = label;
  document.getElementById('tfPanelBody').classList.remove('open');
  document.querySelectorAll('.tf-opt').forEach(b => b.classList.toggle('active', b.dataset.tf == tf));
  document.querySelectorAll('.ctf-btn:not(.ctf-toggle)').forEach(b => b.classList.toggle('active', parseFloat(b.dataset.tf) === tf));
  chart.applyOptions({ timeScale: { secondsVisible: tf < 1 } });
  candleMap.clear();
  firstTick = false;
  lastPrice = null;
  scheduleRender();
  setStatus('تحميل…');
  const id = ++connId;
  stopPricePoll();
  const enc = encodeURIComponent(currentAsset);
  fetch(`/api/history?asset=${enc}&tf=${tf}&limit=50000`)
    .then(r => r.json())
    .then(d => {
      if (id !== connId) return;
      if (d.candles && d.candles.length) { mergeCandles(d.candles); scheduleRender(); }
    }).catch(()=>{});
  if (isConnected) startPricePoll();
  setStatus(currentAsset.replace('_otc','') + ' · ' + label);
}

// ════════════════════════════════════════════════════════
//  CONNECT / DISCONNECT
// ════════════════════════════════════════════════════════
async function connect() {
  if (isConnected) {
    disconnect();
    return;
  }
  isConnected = true;
  connId++;
  firstTick   = false;
  lastPrice   = null;
  document.getElementById('btnConnect').textContent = 'قطع الاتصال';
  document.getElementById('btnConnect').classList.add('connected');
  setDot('connecting');
  setStatus('جارٍ الاتصال…');
  showOverlay('جارٍ الاتصال بـ Quotex…');

  try {
    const r = await fetch('/api/start', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ asset: currentAsset })
    });
    const d = await r.json();
    if (d.status === 'ok') {
      startPricePoll();
    } else {
      setDot('connecting');
      setStatus('جارٍ الاتصال…');
      startPricePoll();
    }
  } catch(e) {
    showToast('فشل الاتصال بالخادم', 'error');
    setDot('');
  }
}

function disconnect() {
  isConnected = false;
  connId++;
  stopPricePoll();
  firstTick = false;
  document.getElementById('btnConnect').textContent = 'اتصال';
  document.getElementById('btnConnect').classList.remove('connected');
  setDot('');
  setStatus('غير متصل');
  hideReconNotice();
  document.getElementById('priceLabel').classList.remove('visible');
  fetch('/api/stop', {method:'POST'}).catch(()=>{});
}

// ════════════════════════════════════════════════════════
//  STATUS POLL
// ════════════════════════════════════════════════════════
let _statusTmr = null;
function startStatusPoll() {
  if (_statusTmr) clearInterval(_statusTmr);
  _statusTmr = setInterval(async () => {
    if (!isConnected) return;
    try {
      const r = await fetch(`/api/status?asset=${encodeURIComponent(currentAsset)}`);
      const d = await r.json();
      if (d.conn_state === 'reconnecting') { showReconNotice(); setDot('connecting'); }
      else if (d.connected)               { hideReconNotice(); setDot('connected'); }
    } catch(_) {}
  }, 4000);
}

// ════════════════════════════════════════════════════════
//  ZOOM / RESET
// ════════════════════════════════════════════════════════
document.getElementById('btnZoomIn').addEventListener('click', () => {
  try {
    const ts = chart.timeScale();
    ts.applyOptions({ barSpacing: Math.min(ts.options().barSpacing * 1.3, 50) });
  } catch(_) {}
});
document.getElementById('btnZoomOut').addEventListener('click', () => {
  try {
    const ts = chart.timeScale();
    ts.applyOptions({ barSpacing: Math.max(ts.options().barSpacing / 1.3, 1) });
  } catch(_) {}
});
document.getElementById('btnReset').addEventListener('click', () => {
  try {
    chart.timeScale().resetTimeScale();
    chart.timeScale().scrollToRealTime();
  } catch(_) {}
});

// ════════════════════════════════════════════════════════
//  EVENTS WIRING
// ════════════════════════════════════════════════════════
document.getElementById('btnConnect').addEventListener('click', connect);

// Asset button
document.getElementById('assetBtn').addEventListener('click', e => {
  e.stopPropagation();
  _apOpen_flag ? closeAssetPanel() : openAssetPanel();
});
document.addEventListener('click', e => {
  if (_apOpen_flag && !document.getElementById('assetPanel').contains(e.target))
    closeAssetPanel();
});
document.getElementById('apSearch').addEventListener('input', buildAssetPanel);
document.querySelectorAll('.ap-cat').forEach(b => b.addEventListener('click', () => {
  _apCat = b.dataset.cat;
  document.querySelectorAll('.ap-cat').forEach(x => x.classList.toggle('active', x === b));
  buildAssetPanel();
}));

// TF dropdown
document.getElementById('btnTF').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('tfDropdown').classList.toggle('open');
});
document.addEventListener('click', e => {
  if (!document.querySelector('.tf-wrap').contains(e.target))
    document.getElementById('tfDropdown').classList.remove('open');
});
document.querySelectorAll('.tf-opt').forEach(b => b.addEventListener('click', () => {
  changeTf(parseFloat(b.dataset.tf), b.dataset.label);
  document.getElementById('tfDropdown').classList.remove('open');
}));

// Chart TF panel (bottom-left overlay) — collapsible
document.querySelectorAll('.ctf-body .ctf-btn').forEach(b => b.addEventListener('click', () => {
  changeTf(parseFloat(b.dataset.tf), b.dataset.label);
}));
document.getElementById('tfPanelToggle').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('tfPanelBody').classList.toggle('open');
});
document.addEventListener('click', (e) => {
  const panel = document.getElementById('chartTfPanel');
  if (panel && !panel.contains(e.target)) document.getElementById('tfPanelBody').classList.remove('open');
});

// Sidebar toggle
document.getElementById('btnSidebar').addEventListener('click', () => {
  _sbVisible = !_sbVisible;
  document.getElementById('sidebar').classList.toggle('collapsed', !_sbVisible);
  setTimeout(() => { try { chart.resize(document.getElementById('chartWrap').clientWidth, document.getElementById('chartWrap').clientHeight); } catch(_) {} }, 380);
});

// Sidebar search/cats
document.getElementById('sbSearch').addEventListener('input', buildSidebar);
document.querySelectorAll('.sb-cat').forEach(b => b.addEventListener('click', () => {
  _sbCat = b.dataset.scat;
  document.querySelectorAll('.sb-cat').forEach(x => x.classList.toggle('active', x === b));
  buildSidebar();
}));

// Settings
document.getElementById('btnSettings').addEventListener('click', () => {
  document.getElementById('settingsPanel').classList.toggle('open');
});
document.getElementById('btnCloseSettings').addEventListener('click', () => {
  document.getElementById('settingsPanel').classList.remove('open');
});
document.querySelectorAll('.sp-preset').forEach(b => b.addEventListener('click', () => {
  applyPreset(b.dataset.preset);
}));
document.getElementById('sp-save').addEventListener('click', saveSettings);
document.getElementById('sp-reset').addEventListener('click', () => {
  localStorage.removeItem(SETTINGS_KEY);
  location.reload();
});

// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════
loadPinned();
initChart();
loadSettings();
applySettingsToChart();
buildSidebar();
buildFavBar();
startClock();
startStatusPoll();
setStatus('غير متصل');
document.getElementById('assetBtnLabel').textContent = pairLabel(DEFAULT_ASSET);
document.getElementById('assetLabel').textContent    = DEFAULT_ASSET.replace('_otc','') + ' · M1';
</script>
</body>
</html>
